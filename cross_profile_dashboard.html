<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>Cross-Profile Status — Hermes Agent</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --green-bg: rgba(63, 185, 80, 0.12);
            --yellow: #d29922;
            --yellow-bg: rgba(210, 153, 34, 0.12);
            --red: #f85149;
            --red-bg: rgba(248, 81, 73, 0.12);
            --gray: #6e7681;
            --gray-bg: rgba(110, 118, 129, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        header h1 span {
            color: var(--accent);
        }

        .meta {
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta .timestamp {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
        }

        .summary-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .summary-stat {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-stat .count {
            font-size: 24px;
            font-weight: 700;
        }

        .summary-stat .label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-stat.active .count { color: var(--green); }
        .summary-stat.idle .count { color: var(--yellow); }
        .summary-stat.stopped .count { color: var(--red); }
        .summary-stat.total .count { color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .badge.active { background: var(--green-bg); color: var(--green); }
        .badge.active .dot { background: var(--green); }
        .badge.idle { background: var(--yellow-bg); color: var(--yellow); }
        .badge.idle .dot { background: var(--yellow); animation: none; }
        .badge.stopped { background: var(--red-bg); color: var(--red); }
        .badge.stopped .dot { background: var(--red); animation: none; }
        .badge.error { background: var(--gray-bg); color: var(--gray); }
        .badge.error .dot { background: var(--gray); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .info-row .label {
            color: var(--text-secondary);
        }

        .info-row .value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text-primary);
        }

        .outputs-list {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .outputs-list h4 {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .outputs-list ul {
            list-style: none;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .outputs-list li {
            padding: 2px 0;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .no-data {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 13px;
        }

        .refresh-notice {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .refresh-notice span {
            color: var(--accent);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .error-banner {
            background: var(--red-bg);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 24px;
            color: var(--red);
        }

        footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>⬡</span> Cross-Profile Status</h1>
            <div class="meta">
                <span class="timestamp" id="timestamp">Loading...</span>
                <span id="profile-count"></span>
            </div>
        </header>

        <div id="error-banner"></div>

        <div class="summary-bar" id="summary-bar"></div>

        <div class="grid" id="cards-grid"></div>

        <div class="refresh-notice">
            Auto-refreshes every <span>30 seconds</span> — Collector: <code id="collector-path"></code>
        </div>

        <footer>
            Hermes Agent Cross-Profile Dashboard • P1 Implementation
        </footer>
    </div>

    <!-- Load collector data (generated by cross_profile_collector.py) -->
    <script src="dashboard_data.js"
            onerror="handleDataLoadError()"></script>

    <script>
        function handleDataLoadError() {
            document.getElementById('error-banner').innerHTML =
                '<div class="error-banner">⚠ Data file not found. Run the collector first:<br>' +
                '<code>python3 /Users/gino/Desktop/agent-assembler/cross_profile_collector.py</code></div>';
            renderNoData();
        }

        function renderNoData() {
            document.getElementById('timestamp').textContent = 'No data available';
            document.getElementById('profile-count').textContent = '';
            document.getElementById('summary-bar').innerHTML = '';
            document.getElementById('cards-grid').innerHTML = '';
        }

        function timeAgo(isoStr) {
            if (!isoStr) return 'Never';
            const dt = new Date(isoStr);
            if (isNaN(dt)) return isoStr;
            const diffMs = Date.now() - dt.getTime();
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHrs = Math.floor(diffMins / 60);
            if (diffHrs < 24) return `${diffHrs}h ${diffMins % 60}m ago`;
            const diffDays = Math.floor(diffHrs / 24);
            return `${diffDays}d ago`;
        }

        function formatTimestamp(isoStr) {
            if (!isoStr) return '—';
            const dt = new Date(isoStr);
            if (isNaN(dt)) return isoStr;
            return dt.toLocaleString();
        }

        function renderDashboard(data) {
            // Timestamp
            document.getElementById('timestamp').textContent =
                'Last updated: ' + formatTimestamp(data.timestamp);

            // Profile count
            const count = data.profiles.length;
            document.getElementById('profile-count').textContent = `${count} profile${count !== 1 ? 's' : ''}`;

            // Summary counts
            const counts = { active: 0, idle: 0, stopped: 0, error: 0, total: count };
            data.profiles.forEach(p => {
                if (counts.hasOwnProperty(p.status)) counts[p.status]++;
            });

            document.getElementById('summary-bar').innerHTML = `
                <div class="summary-stat total">
                    <span class="count">${counts.total}</span>
                    <span class="label">Total</span>
                </div>
                <div class="summary-stat active">
                    <span class="count">${counts.active}</span>
                    <span class="label">Active</span>
                </div>
                <div class="summary-stat idle">
                    <span class="count">${counts.idle}</span>
                    <span class="label">Idle</span>
                </div>
                <div class="summary-stat stopped">
                    <span class="count">${counts.stopped}</span>
                    <span class="label">Stopped</span>
                </div>
            `;

            // Cards
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = data.profiles.map(p => `
                <div class="card">
                    <div class="card-header">
                        <span class="profile-name">${p.name}</span>
                        <span class="badge ${p.status}">
                            <span class="dot"></span>
                            ${p.status}
                        </span>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="label">Gateway PID</span>
                            <span class="value">${p.gateway_pid !== null ? p.gateway_pid : '—'}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Last Activity</span>
                            <span class="value">${timeAgo(p.last_activity)}</span>
                        </div>
                        ${p.details ? `
                        <div class="info-row">
                            <span class="label">Session Last</span>
                            <span class="value">${timeAgo(p.details.session_last)}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Cron Jobs</span>
                            <span class="value">${p.details.job_count || 0}</span>
                        </div>
                        ` : ''}
                        ${p.recent_outputs && p.recent_outputs.length > 0 ? `
                        <div class="outputs-list">
                            <h4>Recent Outputs</h4>
                            <ul>
                                ${p.recent_outputs.map(o =>
                                    `<li>• ${o.file.split('/').slice(-2).join('/')} (${o.age_minutes}m)</li>`
                                ).join('')}
                            </ul>
                        </div>
                        ` : ''}
                        ${p.error ? `
                        <div class="outputs-list">
                            <span class="no-data">Error: ${p.error}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            // Collector path hint
            document.getElementById('collector-path').textContent = 'cross_profile_collector.py';
        }

        // Initialize
        if (typeof window.dashboardData !== 'undefined') {
            renderDashboard(window.dashboardData);
        } else {
            handleDataLoadError();
        }
    </script>
</body>
</html>
