
version: '3.8'

services:
  web:
    build: .
    container_name: agent-assembler-saas
    restart: always
    volumes:
      - ./data:/app/data # Persist tenant data
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src

